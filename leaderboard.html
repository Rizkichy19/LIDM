<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard — FORTIFY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'heading': ['Montserrat', 'ui-sans-serif', 'system-ui'],
                        'sans': ['Montserrat', 'ui-sans-serif', 'system-ui'],
                    },
                    colors: {
                        'primary': '#7B3F00',
                        'primary-dark': '#5C2E00',
                        'gold': '#D4A017',
                        'gold-light': '#F5D060',
                        'gold-dark': '#B8860B',
                        'cream': '#FDF8F0',
                        'cream-dark': '#F5EDE0',
                        'sidebar': '#1C1108',
                        'accent': '#2E7D32',
                        'text-main': '#1A1A1A',
                        'text-light': '#6B5B4F',
                        'text-muted': '#9B8B7F',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .list-move,
        .list-enter-active,
        .list-leave-active {
            transition: all 0.5s ease;
        }
        .list-enter-from,
        .list-leave-to {
            opacity: 0;
            transform: translateX(30px);
        }
        .list-leave-active {
            position: absolute;
        }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-cream min-h-screen pt-16" x-data="leaderboardData()">
    <!-- Top Navigation Bar -->
    <header class="fixed top-0 left-0 right-0 z-50 text-white shadow-lg border-b border-gold/20" style="background-color: #1C1108;">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="menu.html" class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20 transition-all duration-200 text-sm font-medium text-white group">
                <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                <span>Menu</span>
            </a>
            
            <!-- Title -->
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-lg bg-gold-gradient flex items-center justify-center">
                    <svg class="w-4 h-4 text-sidebar" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                </div>
                <span class="font-heading font-bold text-gold text-sm hidden sm:inline">FORTIFY</span>
            </div>

            <div class="text-xs text-[#F5D060]/70 bg-white/10 px-3 py-1.5 rounded-lg hidden md:block">
                Live Leaderboard
            </div>
        </div>
    </header>

    <div class="p-6 lg:p-10 max-w-3xl mx-auto animate-fade-in-up">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gold/10 rounded-full mb-4">
                <span class="text-4xl">🏆</span>
            </div>
            <h1 class="font-heading font-black text-4xl text-primary-dark mb-2 tracking-tight">KLASEMEN SEMENTARA</h1>
            <p class="text-text-light">Peringkat Uji Kompetensi diperbarui secara real-time</p>
        </div>

        <div class="card-heritage !p-2 mb-8">
            <div class="bg-cream rounded-xl overflow-hidden">
                <div class="flex items-center justify-between px-6 py-4 bg-primary text-white font-bold text-sm">
                    <div class="flex items-center gap-4">
                        <span class="w-8 text-center text-white/70">#</span>
                        <span>NAMA SISWA</span>
                    </div>
                    <div class="flex items-center gap-8">
                        <span class="hidden sm:inline">BENAR</span>
                        <span>SKOR</span>
                    </div>
                </div>

                <div class="p-2 min-h-[300px] relative">
                    <!-- Loading state -->
                    <div x-show="loading" class="absolute inset-0 flex items-center justify-center bg-cream z-10">
                        <div class="flex flex-col items-center gap-3">
                            <div class="w-8 h-8 border-4 border-gold border-t-transparent rounded-full animate-spin"></div>
                            <span class="text-text-muted text-sm font-medium">Memuat data secara real-time...</span>
                        </div>
                    </div>

                    <!-- Empty state -->
                    <div x-show="!loading && students.length === 0" x-cloak class="absolute inset-0 flex items-center justify-center bg-cream z-10">
                        <div class="text-center">
                            <span class="text-4xl mb-3 block">👻</span>
                            <span class="text-text-muted text-sm font-medium">Belum ada siswa yang menyelesaikan asesmen.</span>
                        </div>
                    </div>

                    <!-- List of students -->
                    <div class="space-y-2 relative">
                        <template x-for="(student, index) in students" :key="student.id">
                            <div class="flex items-center justify-between px-4 py-3 rounded-xl transition-all duration-500 hover:bg-cream-dark"
                                 :class="index === 0 ? 'bg-gold/10 border border-gold/30' : (index === 1 ? 'bg-slate-100 border border-slate-300' : (index === 2 ? 'bg-orange-50 border border-orange-200' : 'bg-white border border-gray-100'))">
                                <div class="flex items-center gap-4">
                                    <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm flex-shrink-0"
                                         :class="index === 0 ? 'bg-gold text-white' : (index === 1 ? 'bg-slate-400 text-white' : (index === 2 ? 'bg-orange-400 text-white' : 'bg-cream-dark text-text-muted'))">
                                        <span x-text="index + 1"></span>
                                    </div>
                                    <div class="font-semibold text-text-main" :class="index < 3 ? 'text-lg' : 'text-base'">
                                        <span x-text="student.nama"></span>
                                        <span x-show="index === 0" class="ml-2 text-xl" title="Peringkat 1">👑</span>
                                    </div>
                                </div>
                                <div class="flex items-center gap-8 font-bold">
                                    <span class="text-text-muted text-sm hidden sm:inline" x-text="`${student.benar}/${student.total}`"></span>
                                    <span class="w-12 text-right"
                                          :class="index === 0 ? 'text-gold-dark text-xl' : (index === 1 ? 'text-slate-600 text-lg' : (index === 2 ? 'text-orange-600 text-lg' : 'text-primary'))"
                                          x-text="student.skor"></span>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue, query, orderByChild } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDpkzYa9rIgoex2YCZGfHMhC4OFv8OuEiw",
            authDomain: "fortifylearn.firebaseapp.com",
            databaseURL: "https://fortifylearn-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "fortifylearn",
            storageBucket: "fortifylearn.firebasestorage.app",
            messagingSenderId: "523348398414",
            appId: "1:523348398414:web:57b5adbbcbcd0ecf954e1f",
            measurementId: "G-JGEHREPWL7"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        document.addEventListener('alpine:init', () => {
            Alpine.data('leaderboardData', () => ({
                students: [],
                loading: true,
                init() {
                    const leaderboardRef = query(ref(database, 'leaderboard/sumatif'), orderByChild('skor'));
                    
                    onValue(leaderboardRef, (snapshot) => {
                        this.loading = false;
                        const data = snapshot.val();
                        if (data) {
                            // Convert object to array, attach id
                            let studentsArray = Object.keys(data).map(key => ({
                                id: key,
                                ...data[key]
                            }));
                            
                            // Sort by score descending, then by time ascending (earlier = better rank if tied)
                            studentsArray.sort((a, b) => {
                                if (b.skor !== a.skor) {
                                    return b.skor - a.skor;
                                }
                                return a.waktu - b.waktu;
                            });

                            this.students = studentsArray;
                        } else {
                            this.students = [];
                        }
                    }, (error) => {
                        console.error("Firebase Read Error:", error);
                        this.loading = false;
                    });
                }
            }));
        });
    </script>
</body>
</html>
