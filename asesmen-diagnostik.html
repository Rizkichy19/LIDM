<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesmen Diagnostik — Etnomatematika</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'heading': ['Montserrat', 'ui-sans-serif', 'system-ui'],
                        'sans': ['Montserrat', 'ui-sans-serif', 'system-ui'],
                    },
                    colors: {
                        'primary': '#7B3F00',
                        'primary-dark': '#5C2E00',
                        'gold': '#D4A017',
                        'gold-light': '#F5D060',
                        'gold-dark': '#B8860B',
                        'cream': '#FDF8F0',
                        'cream-dark': '#F5EDE0',
                        'sidebar': '#1C1108',
                        'accent': '#2E7D32',
                        'text-main': '#1A1A1A',
                        'text-light': '#6B5B4F',
                        'text-muted': '#9B8B7F',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-cream min-h-screen pt-16">
    <!-- Top Navigation Bar -->
    <header class="fixed top-0 left-0 right-0 z-50 text-white shadow-lg border-b border-gold/20" style="background-color: #1C1108;">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="menu.html" class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20 transition-all duration-200 text-sm font-medium text-white group">
                <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                <span>Menu</span>
            </a>
            
            <!-- Title -->
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-lg bg-gold-gradient flex items-center justify-center">
                    <svg class="w-4 h-4 text-sidebar" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                </div>
                <span class="font-heading font-bold text-gold text-sm hidden sm:inline">FORTIVY</span>
            </div>

            <div class="text-xs text-[#F5D060]/70 bg-white/10 px-3 py-1.5 rounded-lg hidden md:block">
                Asesmen Diagnostik
            </div>
        </div>
    </header>

    <div class="p-6 lg:p-10 max-w-4xl mx-auto" x-data="kuisDiagnostik()">
        
        <!-- Welcome Screen -->
        <div x-show="!mulai && !selesai" class="animate-fade-in-up" style="display: none;">
            <div class="inline-flex items-center gap-2 bg-gold/10 border border-gold/20 rounded-full px-4 py-1.5 mb-4">
                <span class="text-primary text-sm font-semibold">📝 Asesmen Diagnostik</span>
            </div>
            <h1 class="font-heading font-bold text-3xl text-primary-dark mb-2">Asesmen Diagnostik</h1>
            <p class="text-text-light mb-8">Kuis ini bertujuan mengukur pemahaman awal Anda tentang volume dan luas permukaan kubus & balok.</p>

            <div class="card-heritage max-w-md mx-auto text-center">
                <div class="w-16 h-16 bg-gold/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                </div>
                <h3 class="font-heading font-semibold text-lg text-primary mb-4">Masukkan Nama Anda</h3>
                <input type="text" x-model="namaSiswa" placeholder="Nama lengkap..." class="w-full px-4 py-3 rounded-xl border-2 border-gold/20 focus:border-gold focus:outline-none bg-cream text-text-main font-medium text-center mb-4">
                <p class="text-xs text-text-muted mb-6" x-text="`${soals.length} soal pilihan ganda`"></p>
                <button @click="mulaiKuis" class="w-full bg-heritage-gradient text-white font-heading font-bold py-3 rounded-xl hover:opacity-90 transition">
                    Mulai Kuis →
                </button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div x-show="mulai && !selesai" style="display: none;">
            <!-- Header -->
            <div class="flex items-center justify-between mb-6">
                <div>
                    <span class="text-sm text-text-muted">Asesmen Diagnostik</span>
                    <h2 class="font-heading font-bold text-xl text-primary" x-text="`Soal ${currentIndex + 1} / ${soals.length}`"></h2>
                </div>
                <span class="bg-gold/10 text-primary text-sm font-semibold px-3 py-1 rounded-full" x-text="namaSiswa"></span>
            </div>

            <!-- Progress Bar -->
            <div class="w-full bg-cream-dark rounded-full h-2 mb-6">
                <div class="bg-gold-gradient h-2 rounded-full transition-all duration-500" :style="`width: ${((currentIndex + 1) / soals.length) * 100}%`"></div>
            </div>

            <!-- Navigation Dots -->
            <div class="flex flex-wrap gap-2 mb-6">
                <template x-for="(soal, index) in soals" :key="index">
                    <button @click="currentIndex = index"
                            class="w-8 h-8 rounded-lg text-xs font-bold transition-all duration-200"
                            :class="index === currentIndex ? 'bg-primary text-white scale-110' : (jawaban[index] ? 'bg-gold/20 text-primary border border-gold/30' : 'bg-cream-dark text-text-muted hover:bg-cream')"
                            x-text="index + 1">
                    </button>
                </template>
            </div>

            <!-- Question Card -->
            <div class="card-heritage mb-6">
                <div class="flex items-start gap-3 mb-6">
                    <span class="bg-heritage-gradient text-white font-bold text-sm w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" x-text="currentIndex + 1"></span>
                    <p class="text-text-main font-medium leading-relaxed" x-text="soals[currentIndex].pertanyaan"></p>
                </div>

                <!-- Options -->
                <div class="space-y-3">
                    <template x-for="pilihan_key in ['a', 'b', 'c', 'd']" :key="pilihan_key">
                        <button @click="jawaban[currentIndex] = pilihan_key"
                                class="quiz-option w-full text-left flex items-center gap-3 p-3 rounded-lg border transition-all"
                                :class="jawaban[currentIndex] === pilihan_key ? 'border-primary bg-primary/10' : 'border-gold/20 hover:border-gold/50'">
                            <span class="w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm flex-shrink-0"
                                  :class="jawaban[currentIndex] === pilihan_key ? 'bg-primary text-white' : 'bg-cream text-primary'"
                                  x-text="pilihan_key.toUpperCase()">
                            </span>
                            <span class="text-sm" x-text="soals[currentIndex].pilihan[pilihan_key]"></span>
                        </button>
                    </template>
                </div>
            </div>

            <!-- Bottom Navigation -->
            <div class="flex items-center justify-between">
                <button @click="if(currentIndex > 0) currentIndex--"
                        class="flex items-center gap-2 px-5 py-2.5 rounded-xl font-semibold text-sm transition"
                        :class="currentIndex === 0 ? 'bg-cream-dark text-text-muted cursor-not-allowed' : 'bg-white border border-gold/20 text-primary hover:bg-cream'"
                        :disabled="currentIndex === 0">
                    ← Sebelumnya
                </button>

                <button x-show="currentIndex < soals.length - 1" @click="currentIndex++" class="flex items-center gap-2 bg-heritage-gradient text-white px-6 py-2.5 rounded-xl font-semibold text-sm hover:opacity-90 transition">
                    Selanjutnya →
                </button>
                <button x-show="currentIndex === soals.length - 1" @click="submitKuis" class="flex items-center gap-2 bg-accent text-white px-6 py-2.5 rounded-xl font-semibold text-sm hover:bg-accent/90 transition">
                    ✓ Selesai & Lihat Hasil
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div x-show="selesai" class="animate-fade-in-up" style="display: none;">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-24 h-24 rounded-full mb-4"
                     :class="skor >= 80 ? 'bg-accent/10' : (skor >= 60 ? 'bg-gold/10' : 'bg-red-50')">
                    <span class="font-heading font-black text-4xl"
                          :class="skor >= 80 ? 'text-accent' : (skor >= 60 ? 'text-gold-dark' : 'text-red-500')"
                          x-text="skor"></span>
                </div>
                <h2 class="font-heading font-bold text-2xl text-primary-dark mb-1">Hasil Asesmen Diagnostik</h2>
                <p class="text-text-light"><span x-text="namaSiswa"></span> — Benar: <span x-text="jawabanBenar"></span>/<span x-text="soals.length"></span></p>
                <div class="inline-block mt-3 px-4 py-1.5 rounded-full text-sm font-semibold"
                     :class="skor >= 80 ? 'bg-accent/10 text-accent' : (skor >= 60 ? 'bg-gold/10 text-gold-dark' : 'bg-red-50 text-red-500')"
                     x-text="skor >= 80 ? '🌟 Sangat Baik!' : (skor >= 60 ? '👍 Cukup Baik' : '📖 Perlu Belajar Lagi')">
                </div>
            </div>

            <!-- Review -->
            <div class="space-y-4 mb-8">
                <h3 class="font-heading font-semibold text-lg text-primary">Pembahasan Soal</h3>
                <template x-for="(r, index) in review" :key="index">
                    <div class="card-heritage !p-4 border-l-4" :class="r.is_benar ? '!border-l-accent' : '!border-l-red-400'">
                        <div class="flex items-start gap-3 mb-2">
                            <span class="text-sm font-bold" :class="r.is_benar ? 'text-accent' : 'text-red-500'" x-text="`${r.is_benar ? '✓' : '✗'} Soal ${index + 1}`"></span>
                        </div>
                        <p class="text-sm text-text-main mb-2" x-text="r.pertanyaan"></p>
                        <div class="flex flex-wrap gap-4 text-xs">
                            <span class="text-text-muted">Jawaban kamu: <strong :class="r.is_benar ? 'text-accent' : 'text-red-500'" x-text="(r.jawaban_siswa || '-').toUpperCase()"></strong></span>
                            <span class="text-text-muted">Jawaban benar: <strong class="text-accent" x-text="r.jawaban_benar.toUpperCase()"></strong></span>
                        </div>
                        <p class="text-xs text-text-light mt-2 bg-cream rounded-lg p-2" x-text="`💡 ${r.pembahasan}`"></p>
                    </div>
                </template>
            </div>

            <div class="flex flex-wrap gap-4 justify-center">
                <button @click="resetKuis" class="px-6 py-2.5 bg-white border border-gold/20 text-primary rounded-xl font-semibold text-sm hover:bg-cream transition">
                    🔄 Kerjakan Ulang
                </button>
                <a href="pertemuan-1.html" class="px-6 py-2.5 bg-heritage-gradient text-white rounded-xl font-semibold text-sm hover:opacity-90 transition">
                    Lanjut ke Pertemuan 1 →
                </a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('kuisDiagnostik', () => ({
                mulai: false,
                selesai: false,
                namaSiswa: '',
                currentIndex: 0,
                jawaban: {},
                skor: 0,
                jawabanBenar: 0,
                review: [],
                soals: [
                    {
                        pertanyaan: 'Sebuah kubus memiliki panjang rusuk 5 cm. Berapakah volume kubus tersebut?',
                        pilihan: { a: '25 cm³', b: '75 cm³', c: '125 cm³', d: '150 cm³' },
                        jawaban_benar: 'c',
                        pembahasan: 'Volume kubus = s³ = 5³ = 125 cm³'
                    },
                    {
                        pertanyaan: 'Rumus luas permukaan kubus dengan panjang sisi s adalah...',
                        pilihan: { a: 's²', b: '4s²', c: '6s²', d: '8s²' },
                        jawaban_benar: 'c',
                        pembahasan: 'Kubus memiliki 6 sisi yang sama, sehingga luas permukaan = 6 × s² = 6s²'
                    },
                    {
                        pertanyaan: 'Sebuah balok memiliki panjang 8 cm, lebar 5 cm, dan tinggi 3 cm. Berapakah volume balok tersebut?',
                        pilihan: { a: '100 cm³', b: '120 cm³', c: '150 cm³', d: '158 cm³' },
                        jawaban_benar: 'b',
                        pembahasan: 'Volume balok = p × l × t = 8 × 5 × 3 = 120 cm³'
                    },
                    {
                        pertanyaan: 'Berapakah jumlah rusuk pada sebuah balok?',
                        pilihan: { a: '6', b: '8', c: '10', d: '12' },
                        jawaban_benar: 'd',
                        pembahasan: 'Balok memiliki 12 rusuk: 4 rusuk panjang, 4 rusuk lebar, dan 4 rusuk tinggi.'
                    },
                    {
                        pertanyaan: 'Jika panjang rusuk kubus menjadi 2 kali lipat, maka volumenya menjadi berapa kali lipat?',
                        pilihan: { a: '2 kali lipat', b: '4 kali lipat', c: '6 kali lipat', d: '8 kali lipat' },
                        jawaban_benar: 'd',
                        pembahasan: 'Jika s menjadi 2s, maka V = (2s)³ = 8s³. Volumenya menjadi 8 kali lipat.'
                    },
                    {
                        pertanyaan: 'Benteng Fort Willem I memiliki ruangan berbentuk balok dengan ukuran 10 m × 6 m × 4 m. Berapa volume ruangan tersebut?',
                        pilihan: { a: '200 m³', b: '240 m³', c: '260 m³', d: '280 m³' },
                        jawaban_benar: 'b',
                        pembahasan: 'Volume = p × l × t = 10 × 6 × 4 = 240 m³'
                    },
                    {
                        pertanyaan: 'Berapakah luas permukaan balok dengan panjang 4 cm, lebar 3 cm, dan tinggi 2 cm?',
                        pilihan: { a: '24 cm²', b: '42 cm²', c: '52 cm²', d: '60 cm²' },
                        jawaban_benar: 'c',
                        pembahasan: 'Luas permukaan balok = 2(pl + pt + lt) = 2(12 + 8 + 6) = 2 × 26 = 52 cm²'
                    },
                    {
                        pertanyaan: 'Sebuah kubus memiliki volume 343 cm³. Berapa panjang rusuknya?',
                        pilihan: { a: '5 cm', b: '6 cm', c: '7 cm', d: '8 cm' },
                        jawaban_benar: 'c',
                        pembahasan: 'V = s³, maka s = ∛343 = 7 cm'
                    },
                    {
                        pertanyaan: 'Batu bata pada Benteng Fort Willem I berbentuk balok. Jika ukurannya 20 cm × 10 cm × 5 cm, berapa luas permukaan satu batu bata?',
                        pilihan: { a: '500 cm²', b: '600 cm²', c: '700 cm²', d: '800 cm²' },
                        jawaban_benar: 'c',
                        pembahasan: 'LP = 2(20×10 + 20×5 + 10×5) = 2(200+100+50) = 2×350 = 700 cm²'
                    },
                    {
                        pertanyaan: 'Diagonal ruang kubus dengan panjang sisi 4 cm adalah...',
                        pilihan: { a: '4√2 cm', b: '4√3 cm', c: '8 cm', d: '8√2 cm' },
                        jawaban_benar: 'b',
                        pembahasan: 'Diagonal ruang kubus = s√3 = 4√3 cm'
                    }
                ],
                mulaiKuis() {
                    if (!this.namaSiswa.trim()) {
                        alert('Silakan masukkan nama Anda terlebih dahulu.');
                        return;
                    }
                    this.mulai = true;
                },
                submitKuis() {
                    if (Object.keys(this.jawaban).length < this.soals.length) {
                        if (!confirm('Anda belum menjawab semua soal. Yakin ingin menyelesaikan kuis?')) return;
                    }
                    
                    let benar = 0;
                    this.review = this.soals.map((soal, index) => {
                        let jawab = this.jawaban[index] || null;
                        let isBenar = jawab === soal.jawaban_benar;
                        if (isBenar) benar++;
                        return {
                            pertanyaan: soal.pertanyaan,
                            jawaban_siswa: jawab,
                            jawaban_benar: soal.jawaban_benar,
                            is_benar: isBenar,
                            pembahasan: soal.pembahasan
                        };
                    });
                    
                    this.jawabanBenar = benar;
                    this.skor = Math.round((benar / this.soals.length) * 100);
                    this.selesai = true;
                },
                resetKuis() {
                    this.currentIndex = 0;
                    this.jawaban = {};
                    this.mulai = false;
                    this.selesai = false;
                    this.skor = 0;
                    this.jawabanBenar = 0;
                    this.review = [];
                }
            }));
        });
    </script>
</body>
</html>
